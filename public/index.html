<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --gold: #fbbf24;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 100px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; 
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%);
        }

        /* Header with Auth Toggle */
        .header {
            position: sticky; top: 0; z-index: 1000;
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
        }

        .auth-trigger {
            background: var(--glass);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        /* Modals */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
            padding: 20px; backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 30px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Inputs & Buttons */
        input {
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px;
            border: 1px solid var(--border); background: rgba(0,0,0,0.3);
            color: white; box-sizing: border-box; outline: none;
        }

        .btn-pro {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; font-weight: 800; cursor: pointer; margin-top: 10px;
        }

        /* Product Cards */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .p-card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 20px; overflow: hidden;
        }
        .p-card img { width: 100%; height: 110px; object-fit: cover; }

        /* Nav Bar */
        .nav-bar {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            border-radius: 25px; display: flex; justify-content: space-around;
            padding: 12px; border: 1px solid var(--border); z-index: 1000;
        }
        .nav-item { color: #64748b; font-size: 20px; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; text-decoration: none; cursor: pointer; }
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: var(--primary); }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <div id="modal-auth" class="modal hidden">
        <div class="modal-content">
            <h2 id="atitle">Join Store</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-pro" onclick="doAuth()" id="abtn">Login</button>
            <p onclick="toggleAuthMode()" style="color:var(--primary); font-size:13px; margin-top:15px; cursor:pointer;">Switch to Register</p>
            <button onclick="closeModal('modal-auth')" style="background:none; border:none; color:#64748b; margin-top:15px;">Close</button>
        </div>
    </div>

    <div id="modal-sell" class="modal hidden">
        <div class="modal-content">
            <h2>Add Product</h2>
            <input type="text" id="p-title" placeholder="Product Name">
            <input type="number" id="p-price" placeholder="Price ($)">
            <input type="text" id="p-img" placeholder="Image URL (Direct link)">
            <button class="btn-pro" onclick="addProduct()">List Item</button>
            <button onclick="closeModal('modal-sell')" style="background:none; border:none; color:#64748b; margin-top:15px;">Cancel</button>
        </div>
    </div>

    <div class="header">
        <div style="font-weight:900; color:var(--gold)">SID ELITE</div>
        <div class="auth-trigger" onclick="openAuth()">
            <i class="fas fa-user-circle"></i>
            <span id="header-user">Login</span>
        </div>
    </div>

    <div id="page-store" class="product-grid"></div>

    <div id="page-wallet" class="hidden" style="padding: 20px;">
        <div style="background:linear-gradient(135deg, #1e1b4b, #312e81); padding:25px; border-radius:25px; margin-bottom:20px;">
            <span style="opacity:0.7">Wallet Balance</span>
            <h1 id="wall-bal" style="font-size:40px; margin:5px 0">$0.00</h1>
            <div id="upi-display" style="font-size:12px; background:rgba(0,0,0,0.2); padding:10px; border-radius:10px; display:flex; justify-content:space-between; margin-top:10px;">
                <span>7722026588@ptaxis</span> <i class="fas fa-copy"></i>
            </div>
        </div>
        <h3>Add Money</h3>
        <input type="number" id="dep-amt" placeholder="Amount ($)">
        <input type="text" id="dep-utr" placeholder="12-Digit UTR Number">
        <button class="btn-pro" style="background:var(--success)" onclick="submitDeposit()">Submit Deposit</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="n-store" onclick="nav('store')"><i class="fas fa-shop"></i>Store</div>
        <div class="nav-item" id="n-sell" onclick="nav('sell')"><i class="fas fa-plus-circle"></i>Sell</div>
        <div class="nav-item" id="n-wallet" onclick="nav('wallet')"><i class="fas fa-wallet"></i>Wallet</div>
        <div class="nav-item" onclick="tg.showAlert('Coming Soon')"><i class="fas fa-cart-shopping"></i>Cart</div>
    </div>

<script>
    let tg = window.Telegram.WebApp;
    let isReg = false;
    let curUser = null;
    let market = [
        {id:1, title: "Premium Account", price: 10, image: "https://picsum.photos/200/110?random=1"},
        {id:2, title: "Custom Bot Key", price: 25, image: "https://picsum.photos/200/110?random=2"}
    ];

    function toggleAuthMode() {
        isReg = !isReg;
        document.getElementById('atitle').innerText = isReg ? "Create Account" : "Join Store";
        document.getElementById('abtn').innerText = isReg ? "Register" : "Login";
    }

    function openAuth() {
        if(curUser) return tg.showAlert("You are logged in as " + curUser.username);
        document.getElementById('modal-auth').classList.remove('hidden');
    }

    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

    async function doAuth() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(!u || !p) return tg.showAlert("Fill all fields");
        
        // Simulating Auth for Demo (Replace with your actual fetch)
        curUser = { username: u, balance: 0 };
        document.getElementById('header-user').innerText = u;
        document.getElementById('wall-bal').innerText = "$0.00";
        closeModal('modal-auth');
        tg.showAlert("Welcome, " + u);
    }

    function nav(t) {
        if(t === 'sell') {
            if(!curUser) return tg.showAlert("Please Login to Sell items!");
            document.getElementById('modal-sell').classList.remove('hidden');
            return;
        }
        
        ['page-store', 'page-wallet'].forEach(p => document.getElementById(p).classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        
        document.getElementById('page-' + t).classList.remove('hidden');
        document.getElementById('n-' + t).classList.add('active');
        tg.HapticFeedback.selectionChanged();
    }

    function renderStore() {
        document.getElementById('page-store').innerHTML = market.map(p => `
            <div class="p-card">
                <img src="${p.image}">
                <div style="padding:10px;">
                    <div style="font-size:12px; font-weight:600; height:32px; overflow:hidden;">${p.title}</div>
                    <div style="color:var(--gold); font-weight:800; margin:5px 0;">$${p.price}</div>
                    <button class="btn-pro" style="padding:8px; font-size:11px; margin-top:0;">Buy</button>
                </div>
            </div>
        `).join('');
    }

    function addProduct() {
        const title = document.getElementById('p-title').value;
        const price = document.getElementById('p-price').value;
        const img = document.getElementById('p-img').value || "https://picsum.photos/200/110";

        if(!title || !price) return tg.showAlert("Please add Title and Price");

        market.unshift({ id: Date.now(), title, price: parseFloat(price), image: img });
        renderStore();
        closeModal('modal-sell');
        tg.showAlert("Product Listed!");
        nav('store');
    }

    function submitDeposit() {
        if(!curUser) return tg.showAlert("Login to deposit!");
        tg.showAlert("Request Submitted! Admin will verify UTR.");
    }

    // Init
    window.onload = () => {
        tg.expand();
        renderStore();
    }
</script>
</body>
</html>
