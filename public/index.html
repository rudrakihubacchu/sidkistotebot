<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #60a5fa;
            --bg: #030712;
            --glass: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f9fafb;
            --gold: #f59e0b;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- Animated Background --- */
        .bg-mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 50%),
                                    radial-gradient(circle at 100% 100%, #1e3a8a 0%, transparent 50%),
                                    radial-gradient(circle at 50% 50%, #030712 0%, transparent 100%);
            animation: pulse 10s infinite alternate;
        }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

        /* --- Auth Section --- */
        .auth-container {
            height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .glass-card {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 28px;
            padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        input {
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 14px;
            border: 1px solid var(--border); background: rgba(0,0,0,0.3);
            color: white; font-size: 16px; box-sizing: border-box;
        }

        .btn-pro {
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; font-weight: 700; font-size: 16px; cursor: pointer;
            transition: 0.3s ease; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        /* --- Main UI --- */
        .header {
            position: sticky; top: 0; z-index: 100; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(3, 7, 18, 0.6); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .product-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px;
        }

        .p-card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 24px; overflow: hidden; transition: 0.3s;
        }
        .p-card:active { transform: scale(0.96); }
        .p-card img { width: 100%; height: 120px; object-fit: cover; }
        .p-content { padding: 12px; }

        .nav-bar {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 24px;
            display: flex; justify-content: space-around; padding: 10px;
        }
        .nav-item { border: none; background: none; color: #9ca3af; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--primary); }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <div id="view-auth" class="auth-container">
        <div class="glass-card">
            <h1 id="atitle" style="margin-top:0; font-size: 28px;">Sign In</h1>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-pro" onclick="doAuth()" id="abtn">Login</button>
            <p onclick="toggleAuth()" style="text-align:center; color: var(--accent); cursor:pointer; margin-top:20px;">
                Don't have an account? Register
            </p>
        </div>
    </div>

    <div id="main-ui" class="hidden">
        <div class="header">
            <span style="font-weight:900; letter-spacing:1px; color:var(--gold)">SID PRO</span>
            <div id="top-bal" style="color:var(--primary); font-weight:bold;">$0.00</div>
        </div>

        <div id="store-page" class="product-grid"></div>

        <div id="profile-page" class="hidden" style="padding: 30px; text-align:center;">
            <div style="background:var(--glass); padding:30px; border-radius:30px; border:1px solid var(--border);">
                <div style="width:70px; height:70px; background:var(--primary); border-radius:50%; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:30px;">
                    <i class="fas fa-user"></i>
                </div>
                <h2 id="prof-user" style="margin:0">User</h2>
                <p id="prof-date" style="color:#6b7280; font-size:12px;">Joined: 2026</p>
                <button class="btn-pro" style="margin-top:20px; background:#ef4444;" onclick="location.reload()">Logout</button>
            </div>
        </div>

        <div class="nav-bar">
            <button class="nav-item active" id="ns" onclick="nav('store')"><i class="fas fa-grid-2 fa-lg"></i>Store</button>
            <button class="nav-item" id="np" onclick="nav('profile')"><i class="fas fa-user fa-lg"></i>Profile</button>
        </div>
    </div>

<script>
    let tg = window.Telegram.WebApp;
    let isReg = false;
    let curUser = null;
    let isAdmin = false;

    function toggleAuth() {
        isReg = !isReg;
        document.getElementById('atitle').innerText = isReg ? "Register" : "Sign In";
        document.getElementById('abtn').innerText = isReg ? "Create Account" : "Login";
    }

    async function doAuth() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(!u || !p) return tg.showAlert("Fill fields");

        const path = isReg ? '/api/register' : '/api/login';
        const res = await fetch(path, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p, tgId: tg.initDataUnsafe?.user?.id})
        });
        const data = await res.json();

        if(res.ok) {
            if(isReg) {
                tg.showAlert("Registered! Now login.");
                toggleAuth();
            } else {
                curUser = data.user;
                isAdmin = data.isOwner;
                document.getElementById('view-auth').classList.add('hidden');
                document.getElementById('main-ui').classList.remove('hidden');
                document.getElementById('prof-user').innerText = data.user.username;
                document.getElementById('prof-date').innerText = "Member since: " + data.user.joined;
                document.getElementById('top-bal').innerText = "$" + data.user.balance;
                renderStore(data.market);
            }
        } else {
            tg.showAlert(data.error);
        }
    }

    function renderStore(market) {
        const grid = document.getElementById('store-page');
        grid.innerHTML = market.map(p => `
            <div class="p-card">
                <img src="${p.image}">
                <div class="p-content">
                    <div style="font-size:13px; font-weight:500; height:34px; overflow:hidden;">${p.title}</div>
                    <div style="color:var(--gold); font-weight:800; margin:5px 0;">$${p.price}</div>
                    <button class="btn-pro" style="padding:8px; font-size:12px;" onclick="tg.showAlert('Buying...')">Buy</button>
                    ${isAdmin ? `<button onclick="setPrice(${p.id})" style="width:100%; margin-top:5px; background:#ef4444; border:none; border-radius:8px; color:white; padding:5px; font-size:10px;">EDIT PRICE</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    async function setPrice(id) {
        const p = prompt("New Price:");
        if(p) {
            await fetch('/api/admin/update-price', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: curUser.username, itemId: id, newPrice: p})
            });
            location.reload();
        }
    }

    function nav(t) {
        document.getElementById('store-page').classList.toggle('hidden', t !== 'store');
        document.getElementById('profile-page').classList.toggle('hidden', t !== 'profile');
        document.getElementById('ns').classList.toggle('active', t === 'store');
        document.getElementById('np').classList.toggle('active', t === 'profile');
        tg.HapticFeedback.selectionChanged();
    }
</script>
</body>
</html>
